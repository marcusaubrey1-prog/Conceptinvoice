<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Concept Decorating PAYE Portal</title>

<link rel="icon" href="../IMG_0221.png">
<link rel="apple-touch-icon" href="../IMG_0221.png">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3f4f6;
margin:0;
padding:20px;
color:#111;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.1);
margin-bottom:20px;
text-align:center;
}

.logo{
width:220px;
margin-bottom:15px;
}

h1{
margin:10px 0;
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
}

button{
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
width:100%;
margin-top:10px;
}

.whatsapp{
background:#25D366;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN SCREEN -->

<div id="login" class="card">

<img src="../IMG_0221.png" class="logo">

<h1>PAYE Operative<br>Timesheet Portal</h1>

<p>Enter access code</p>

<input id="code" type="password" placeholder="Access code">

<button onclick="login()">Enter</button>

</div>


<!-- TIMESHEET -->

<div id="app" class="card" style="display:none">

<img src="../IMG_0221.png" class="logo">

<h1>Operative Timesheet</h1>

<input id="name" placeholder="Operative Name">

<input id="rate" placeholder="Hourly Rate (£)">

<input id="week" type="date">

<h3>Hours Worked</h3>

<input id="mon" placeholder="Monday Hours">
<input id="tue" placeholder="Tuesday Hours">
<input id="wed" placeholder="Wednesday Hours">
<input id="thu" placeholder="Thursday Hours">
<input id="fri" placeholder="Friday Hours">
<input id="sat" placeholder="Saturday Hours">
<input id="sun" placeholder="Sunday Hours">

<h3>Extras</h3>

<input id="bonus" placeholder="Bonus £">
<input id="miles" placeholder="Miles Driven">

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="generatePDF()">Generate PDF</button>

<button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>

</div>

</div>


<script>

function login(){

if(document.getElementById("code").value=="paye"){

document.getElementById("login").style.display="none"

document.getElementById("app").style.display="block"

}

}

function num(v){return parseFloat(v)||0}


function calculateTotal(){

let rate=num(document.getElementById("rate").value)

let weekday=

(num(mon.value)+
num(tue.value)+
num(wed.value)+
num(thu.value)+
num(fri.value))*rate

let satPay=num(sat.value)*rate*1.5
let sunPay=num(sun.value)*rate*2

let mileage=num(miles.value)*0.45

let total=weekday+satPay+sunPay+num(bonus.value)+mileage

return total

}


function generatePDF(){

let total=calculateTotal()

let html=`

<h1>Concept Decorating</h1>

<img src="../IMG_0221.png" width="200">

<h2>PAYE Timesheet</h2>

<p><b>Operative:</b> ${name.value}</p>

<p><b>Week Ending:</b> ${week.value}</p>

<p><b>Total Pay:</b> £${total.toFixed(2)}</p>

`

let w=window.open()

w.document.write(html)

w.print()

}



function sendWhatsApp(){

let total=calculateTotal()

let message=

`Concept Decorating PAYE Timesheet

Operative: ${name.value}

Week Ending: ${week.value}

Total Pay: £${total.toFixed(2)}

Notes:
${notes.value}`

let url=`https://wa.me/?text=${encodeURIComponent(message)}`

window.open(url)

}

</script>

</body>
</html>
